<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUM V2</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="loader" id="loader">
  <h1>NEXUM</h1>
</div>

<header>
  <div class="logo-area">
    <img src="logo.png">
    <div>
      <h1>NEXUM</h1>
      <p>Venta Tecnológica</p>
    </div>
  </div>

  <div class="header-buttons">
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
  </div>
</header>

<section class="hero">
  <h2>TECNOLOGÍA DEL FUTURO</h2>
  <p>Gaming, periféricos y smartphones premium.</p>
</section>

<section class="filters">
  <input type="text" id="search" placeholder="Buscar productos..." onkeyup="searchProducts()">

  <select id="category" onchange="filterCategory()">
    <option value="all">Todas las categorías</option>
    <option value="celulares">Celulares</option>
    <option value="gaming">Gaming</option>
    <option value="audio">Audio</option>
  </select>
</section>

<section class="products" id="products">

  <div class="card" data-name="iphone 15" data-category="celulares">
    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000">
    <h3>iPhone 15</h3>
    <p>$1.200.000</p>
    <button onclick="addToCart('iPhone 15',1200000)">Agregar</button>
  </div>

  <div class="card" data-name="auriculares gamer" data-category="audio">
    <img src="https://images.unsplash.com/photo-1583394838336-acd977736f90?q=80&w=1000">
    <h3>Auriculares Gamer</h3>
    <p>$75.000</p>
    <button onclick="addToCart('Auriculares Gamer',75000)">Agregar</button>
  </div>

  <div class="card" data-name="teclado rgb" data-category="gaming">
    <img src="https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1000">
    <h3>Teclado RGB</h3>
    <p>$58.000</p>
    <button onclick="addToCart('Teclado RGB',58000)">Agregar</button>
</html>
